# AI Prompt Templates for Financial Analysis
# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# TOOL REFERENCE (shared across all agents)
#
# SEARCH TOOLS
#   search_web(query, count=5)
#     в†’ General web search via DuckDuckGo. Use for background context,
#       company info, or non-news queries.
#
#   search_news(query, count=10, timelimit="d")
#     в†’ Recent news via DuckDuckGo News.
#       timelimit: "d"=last day | "w"=last week | "m"=last month
#
#   search_google_news(query, days=1, language="en")
#     в†’ Google News search. Supports language ("tr", "en", etc.).
#
# URL READING TOOLS (choose based on token budget)
#   summarize_url_content(url, focus_query?)         в†ђ PREFERRED
#     в†’ Fetches the URL and returns the most relevant source passages via
#       retrieval-style pruning.
#       Token-efficient. Preserves original wording for key figures, names,
#       dates, and claims.
#       Use this in most situations.
#
#   fetch_url_content(url, focus_query?)              в†ђ USE SPARINGLY
#     в†’ Fetches the full raw text and sends it DIRECTLY to you unprocessed.
#       High token cost. Reserve for primary sources, regulatory filings,
#       or when the pruned version misses critical detail.
#
#   Both tools are EPHEMERAL вЂ” their output is purged from history after 2
#   steps. ALWAYS call update_working_memory immediately after either tool
#   to preserve all extracted facts.
#
# FINANCIAL DATA
#   yfinance_search(query, max_results=10, type_filter?, news_results=0)
#     в†’ Find ticker symbols, company names, ETFs, indices.
#       type_filter: "stock" | "etf" | "index" | "crypto" | "mutualfund"
#       Only supported args are query, max_results, type_filter, news_results.
#       Do NOT invent args like count, limit, asset_type, or max_hits.
#
#   yfinance_index_data(symbol)
#     в†’ Index/ETF data package (returns, trends, key metrics).
#
#   yfinance_overview(ticker)
#     в†’ Modular company overview (identity, key metrics, base price info).
#
#   yfinance_price_history(ticker, period?, interval?)
#     в†’ OHLCV + technical indicators.
#
#   yfinance_dividends(ticker), yfinance_analyst(ticker), yfinance_earnings(ticker),
#   yfinance_ownership(ticker), yfinance_sustainability(ticker)
#     в†’ Prefer modular access to company data in discrete chunks.
#
#   yfinance_sector_analysis(sector_key? | industry_key?)
#     в†’ Sector/industry overview and top companies.
#
#   yfinance_company_data(ticker)
#     в†’ Full financial data: financials, ratios, price history, info.
#       Ticker must include exchange suffix for non-US (e.g., "THYAO.IS").
#
# KAP DISCLOSURES (Turkish official filings)
#   kap_search_disclosures(stock_codes, category?, days?, from_date?, to_date?)
#     в†’ Search official KAP disclosures by stock codes and filters.
#
#   kap_get_disclosure_detail(disclosure_index)
#     в†’ Fetch full details for one disclosure (summary, body text, signatures, attachments).
#
#   kap_batch_disclosure_details(disclosure_indexes, max_workers=5)
#     в†’ Fetch details for multiple disclosures in one request.
#
# TOOL QUALITY METRICS
#   get_tool_quality_metrics(tool_name?, reset?)
#     в†’ Returns aggregated tool reliability/quality metrics for adaptive planning.
#
# RAG MEMORY SEARCH
#   search_memory(query?, collection?, symbol?, limit=5, detail_level="preview", hit_ids?, context_window?)
#     в†’ Semantic retrieval over persistent memory:
#       - analysis: past analysis outputs
#       - pre_research: prior exchange/sector reports
#       - news: summarized article chunks
#       Preferred workflow:
#       1) Run preview search first and inspect returned hit_ids
#       2) Re-run with hit_ids + detail_level="full" to hydrate selected evidence
#
# MEMORY
#   update_working_memory(new_facts?, new_questions?, contradictions?,
#                         source_summary?, resolve_questions?,
#                         fact_importance?, fact_tags?, fact_provenance?)
#     в†’ Your ONLY persistent memory across steps. Capped: 60 facts, 20
#       questions. Call after EVERY tool result вЂ” anything not saved here
#       is permanently lost when history is compressed.
#       Structured facts may include a provenance object with source_id,
#       doc_group_id, chunk_index, retrieval_score, timestamp, evidence_type.
#
# PYTHON EXECUTION
#   python_exec(code, input_data?, timeout_seconds?)
#     в†’ Executes bounded local Python for exact calculations and short data
#       transformations. Use for multi-step numeric reasoning that must be
#       exact. Supports sandboxed temporary files only.
#       No outbound network, subprocesses, package installation, or
#       filesystem access outside the sandbox.
#
# DEVELOPER REPORTING
#   report(title, category, severity, summary, details?, suggested_fix?,
#          context?, fingerprint?)
#     в†’ Writes a redacted developer-facing JSONL report for actionable
#       technical issues, risks, or improvement opportunities.
#       Always available, but do NOT spam it and never include secrets.
#
# FINISH
#   finish(final_analysis, research_summary?)
#     в†’ Ends the agent loop and returns the final report.
# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

